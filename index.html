<!DOCTYPE html>
<html>
<head> <link rel="stylesheet" href="style.css">
  <title>DRE Automático</title>
</head>
<body>

  <h1>Sistema de DRE</h1>

  <input type="text" id="descricao" placeholder="Descrição">

  <p id="resultado"></p>

  <script src="script.js"></script>

</body>
</html>
